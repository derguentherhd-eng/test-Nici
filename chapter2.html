<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="Images/Icons/Typo und Technologie Logo.jpg">
  <link rel="apple-touch-icon" href="Images/Icons/Typo und Technologie Logo.jpg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=1366, height=1024, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
  <title>CH.02 — Karteikarten-Karussell · Type Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-background flex flex-col">

  <div class="ch2-header">
    <header class="chapter-header">
      <div class="chapter-header-inner">
        <span class="chapter-num font-mono">CH.02</span>
        <span class="chapter-title-label font-display">Schriftlehre-Karteikarten</span>
        <div class="progress-dots" id="progress-dots"></div>
        <div class="chapter-header-right">
          <button class="btn-complete" id="btn-complete" type="button">Abschließen &amp; weiter</button>
        </div>
      </div>
      <p class="chapter-eyebrow text-muted">
        Wische durch das Kartendeck. Tippe auf eine Karte, um sie umzudrehen und die Antwort zu sehen.
      </p>
    </header>
  </div>

  <main class="chapter-main animate-in">
    <div class="ch2-stage">
      <div class="ch2-carousel" id="ch2-carousel"></div>
      <div class="ch2-controls">
        <button class="ch2-btn-nav" id="ch2-prev" type="button" aria-label="Vorherige Karte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="ch2-counter font-mono" id="ch2-counter">01 / 08</div>
        <button class="ch2-btn-nav" id="ch2-next" type="button" aria-label="Nächste Karte">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <button class="ch2-btn-flip font-display" id="ch2-flip" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
          Karte wenden
        </button>
      </div>
    </div>
  </main>

  <script src="progress.js"></script>
  <script src="overlay.js"></script>
  <script src="chapter2.js"></script>
  <script>
  (function() {
    function pwaNav(e) {
      var a = e.target.closest('a[href]');
      if (!a || a.target === '_blank') return;
      try {
        var url = new URL(a.href, location.href);
        if (url.origin !== location.origin) return;
      } catch(ex) { return; }
      e.preventDefault();
      window.location.assign(a.href);
    }
    document.addEventListener('touchend', pwaNav, { passive: false });
    document.addEventListener('click',    pwaNav, false);
  })();
  </script>
</body>
</html>
