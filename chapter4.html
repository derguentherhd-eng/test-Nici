<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="Images/Icons/Typo und Technologie Logo.jpg">
  <link rel="apple-touch-icon" href="Images/Icons/Typo und Technologie Logo.jpg">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=1366, height=1024, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover" />
  <title>CH.04 — Variable Font Playground · Type Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="min-h-screen bg-background flex flex-col">

  <div class="ch4-header">
    <header class="chapter-header">
      <div class="chapter-header-inner">
        <span class="chapter-num font-mono">CH.04</span>
        <span class="chapter-title-label font-display">Variable Font Playground</span>
        <div class="progress-dots" id="progress-dots"></div>
        <div class="chapter-header-right">
          <button class="btn-complete" id="btn-complete" type="button">Abschließen &amp; weiter</button>
        </div>
      </div>
      <p class="chapter-eyebrow text-muted">
        Jede Zeile zeigt eine einzelne variable Achse. Ziehe den Regler und beobachte, wie der Beispieltext reagiert. Rechts steht, warum diese Achse wichtig ist.
      </p>
    </header>
  </div>

  <main class="chapter-main animate-in">
    <div class="ch4-layout" id="ch4-layout"></div>
  </main>

  <script src="progress.js"></script>
  <script src="overlay.js"></script>
  <script src="chapter4.js"></script>
  <script src="slider-touch.js"></script>
  <script>
  (function() {
    function pwaNav(e) {
      var a = e.target.closest('a[href]');
      if (!a || a.target === '_blank') return;
      try {
        var url = new URL(a.href, location.href);
        if (url.origin !== location.origin) return;
      } catch(ex) { return; }
      e.preventDefault();
      window.location.assign(a.href);
    }
    document.addEventListener('touchend', pwaNav, { passive: false });
    document.addEventListener('click',    pwaNav, false);
  })();
  </script>
</body>
</html>
